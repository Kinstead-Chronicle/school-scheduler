<html lang="en">
<head>

<title>School Scheduler</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
:root {
  --bg: #0f0f11; --surface: #17171a; --surface2: #1e1e23; --surface3: #26262d;
  --border: #2e2e38; --accent: #7ef0a2; --accent2: #4fc8ff; --accent3: #ffb547;
  --danger: #ff6b6b; --text: #f0f0f0; --text2: #9999aa; --text3: #666677;
  --mono: 'DM Mono', monospace; --serif: 'Fraunces', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; }
.update-bar { background: var(--accent3); color: #1a1a00; padding: 10px 20px; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 12px; font-weight: 500; }
.update-bar button { background: #1a1a00; color: var(--accent3); border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: var(--mono); font-size: 11px; }
.shell { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }

.logo { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }

.nav { padding: 12px 0; flex: 1; }
.nav-section { padding: 8px 20px 4px; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; cursor: pointer; color: var(--text2); font-size: 12px; transition: all 0.15s; border-left: 2px solid transparent; }
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--surface2); }

.nav-item.active .nav-dot { background: var(--accent); }

.sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text3); }
.page-header { margin-bottom: 28px; }
.page-title { font-family: var(--serif); font-size: 28px; font-weight: 300; color: var(--text); margin-bottom: 4px; }
.page-sub { color: var(--text2); font-size: 12px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
label { font-size: 11px; color: var(--text2); display: block; margin-bottom: 5px; }
input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 8px 10px; outline: none; transition: border-color 0.15s; }
input:focus, select:focus { border-color: var(--accent); }
input::placeholder { color: var(--text3); }
select option { background: var(--surface2); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 5px; border: none; cursor: pointer; font-family: var(--mono); font-size: 12px; font-weight: 500; transition: all 0.15s; }
.btn-primary { background: var(--accent); color: #0a1a10; }
.btn-primary:hover { background: #9af5b8; }
.btn-secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--surface2); }
.btn-danger { background: var(--danger); color: white; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }

.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); padding: 8px 12px; border-bottom: 1px solid var(--border); }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); }
tr:hover td { background: var(--surface2); color: var(--text); }
tr:last-child td { border-bottom: none; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; margin: 1px; }
.tag-green { background: rgba(126,240,162,0.15); color: var(--accent); border: 1px solid rgba(126,240,162,0.25); }

.tag-yellow { background: rgba(255,181,71,0.15); color: var(--accent3); border: 1px solid rgba(255,181,71,0.25); }
.tag-red { background: rgba(255,107,107,0.15); color: var(--danger); border: 1px solid rgba(255,107,107,0.25); }
.tag-gray { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.stat-value { font-family: var(--serif); font-size: 28px; font-weight: 300; color: var(--text); }
.upload-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.15s; }
.upload-zone:hover { border-color: var(--accent); background: rgba(126,240,162,0.03); }
.alert { padding: 12px 14px; border-radius: 6px; font-size: 12px; margin-bottom: 12px; }
.alert-warn { background: rgba(255,181,71,0.1); border: 1px solid rgba(255,181,71,0.25); color: var(--accent3); }
.alert-error { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.25); color: var(--danger); }
.alert-success { background: rgba(126,240,162,0.1); border: 1px solid rgba(126,240,162,0.25); color: var(--accent); }
.alert-info { background: rgba(79,200,255,0.1); border: 1px solid rgba(79,200,255,0.25); color: var(--accent2); }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-title { font-family: var(--serif); font-size: 18px; color: var(--text2); margin-bottom: 6px; }
.empty-sub { font-size: 12px; }
.row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.flex { display: flex; align-items: center; gap: 10px; }
.flex-col { display: flex; flex-direction: column; gap: 12px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
.modal-title { font-family: var(--serif); font-size: 20px; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.conflict-card { background: var(--surface); border: 1px solid rgba(255,107,107,0.3); border-radius: 8px; padding: 16px; margin-bottom: 10px; }
.period-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 5px 10px; min-width: 90px; }
.period-pill-empty { border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.05); }
.progress-bar { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
.next-bar { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; align-items: center; gap: 12px; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const APP_VERSION = "1.2.6";
const VERSION_URL = "https://kinstead-chronicle.github.io/school-scheduler/version.json";
const APP_URL = "https://kinstead-chronicle.github.io/school-scheduler/app.html";
const STORAGE_KEY = "school_scheduler_v1";

const BLANK = { schoolName: "", lunchStart: "", lunchEnd: "", numPeriods: 6, periods: [], classes: [], electives: [], peaksPairs: [], electiveDefaults: { maxSize: "25", minSize: "" }, students: [], runs: [] };

function load() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
function save(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

function runScheduler(state) {
  const { periods, classes, electives, students, peaksPairs = [] } = state;
  if (!students.length || !periods.length) return { assignments: [], conflicts: [] };

  const pids = periods.map(p => p.id);
  const MAX_STANDARD = 4;
  const NUM_ELECTIVES = 2;

  // ── Period availability maps ───────────────────────────────────────────────
  const classPMap = {};
  const singlePeriod = new Set();
  classes.forEach(c => {
    const ps = (c.periods || "").split(",").map(x => x.trim()).filter(Boolean);
    const valid = ps.filter(p => pids.includes(p));
    classPMap[c.id] = valid.length ? valid : [...pids];
    if (valid.length === 1) singlePeriod.add(c.id);
  });

  const electivePMap = {};
  electives.forEach(e => {
    const ps = (e.availablePeriods || "").split(",").map(x => x.trim()).filter(Boolean);
    const valid = ps.filter(p => pids.includes(p));
    electivePMap[e.id] = valid.length ? valid : [...pids];
  });

  // ── Enrollment tracking ────────────────────────────────────────────────────
  const enroll = {};
  const ekey = (id, pid) => id + "__" + pid;
  const getE = (id, pid) => enroll[ekey(id, pid)] || 0;
  const addE = (id, pid) => { enroll[ekey(id, pid)] = (enroll[ekey(id, pid)] || 0) + 1; };

  // Track active period slots per class (for max periods enforcement)
  const activeSlots = {}; // id -> Set of pids
  const getSlots = id => activeSlots[id] || (activeSlots[id] = new Set());
  const markSlot = (id, pid) => getSlots(id).add(pid);

  // ── Caps ───────────────────────────────────────────────────────────────────
  const globalElecMax = parseInt((state.electiveDefaults || {}).maxSize) || 25;
  const globalElecMin = parseInt((state.electiveDefaults || {}).minSize) || 0;
  const globalElecMaxPeriods = parseInt((state.electiveDefaults || {}).maxPeriods) || Infinity;

  const isElective = id => electives.some(e => e.id === id);

  const maxSize = item => {
    const explicit = parseInt(item.maxSize);
    if (!isNaN(explicit) && explicit > 0) return explicit;
    if (isElective(item.id)) return globalElecMax;
    return 25; // default for standard classes
  };

  const minSize = item => {
    const explicit = parseInt(item.minSize);
    if (!isNaN(explicit) && explicit > 0) return explicit;
    return isElective(item.id) ? globalElecMin : 0;
  };

  const maxPeriods = item => {
    const explicit = parseInt(item.maxPeriods);
    if (!isNaN(explicit) && explicit > 0) return explicit;
    return isElective(item.id) ? globalElecMaxPeriods : Infinity;
  };

  // Can this class accept another student in this period?
  // studentUsed: Set of period IDs already taken by this student (optional)
  const canAssign = (item, pid, studentUsed) => {
    const ms = maxSize(item);
    const slots = getSlots(item.id);
    // ALWAYS enforce per-period cap first
    if (getE(item.id, pid) >= ms) return false;
    // If this is an existing slot, allow (cap already checked above)
    if (slots.has(pid)) return true;
    // This is a NEW slot - check maxPeriods limit
    if (slots.size >= maxPeriods(item)) return false;
    // For ELECTIVES only: only open a new slot if the student cannot
    // access any existing slot that still has room
    if (isElective(item.id) && studentUsed) {
      const accessibleWithRoom = [...slots].some(p =>
        !studentUsed.has(p) && getE(item.id, p) < ms
      );
      // If any existing slot is accessible and has room, don't open new slot
      if (accessibleWithRoom) return false;
    } else if (isElective(item.id) && !studentUsed) {
      // Without student context, fall back to: block if any slot has room
      const existingHasRoom = slots.size > 0 && [...slots].some(p => getE(item.id, p) < ms);
      if (existingHasRoom) return false;
    }
    // Standard classes: open new slots freely
    return true;
  };
  // Wrapper that always passes student context
  const canAssignFor = (item, pid, usedSet) => canAssign(item, pid, usedSet);

  // ── Student constraint scoring ─────────────────────────────────────────────
  const getChoices = s => {
    const ch = [];
    for (let i = 1; i <= 12; i++) { const v = s["choice_" + i]; if (v && v.trim()) ch.push(v.trim()); }
    return ch;
  };

  const scoreStudent = student => {
    let sc = 0;
    const grade = parseInt(student.grade);
    const desigs = (student.designation || "").split("|").map(d => d.trim()).filter(Boolean);
    if (desigs.includes("ELA Intervention") || desigs.includes("Math Intervention")) sc += 1000;
    if (desigs.includes("ESE")) sc += 300;
    if (desigs.includes("Accelerated")) sc += 200;
    if (peaksPairs.find(p => p.gradeLevel === String(grade))) sc += 600;
    const matchGrade = c => c.grades && c.grades.length > 0 ? c.grades.includes(String(grade)) : (!c.gradeLevel || c.gradeLevel === "all" || c.gradeLevel === String(grade));
    classes.filter(matchGrade).forEach(c => {
      const ps = classPMap[c.id] || [];
      if (ps.length === 1) sc += 500;
      else if (ps.length <= 2) sc += 100;
    });
    getChoices(student).forEach(name => {
      const e = electives.find(el => el.name.toLowerCase() === name.toLowerCase());
      if (e) {
        const ps = electivePMap[e.id] || [];
        if (ps.length === 1) sc += 200;
        else if (ps.length <= 2) sc += 50;
      }
    });
    return sc;
  };

  // Sort most-constrained students first
  const sorted = [...students].sort((a, b) => scoreStudent(b) - scoreStudent(a));

  const conflicts = [];

  // ── Schedule each student ──────────────────────────────────────────────────
  const assignments = sorted.map(student => {
    const grade = parseInt(student.grade);
    const desigs = (student.designation || "").split("|").map(d => d.trim()).filter(Boolean);
    const schedule = {};
    const used = new Set();
    let stdCount = 0;

    const matchGrade = c => c.grades && c.grades.length > 0 ? c.grades.includes(String(grade)) : (!c.gradeLevel || c.gradeLevel === "all" || c.gradeLevel === String(grade));
    const gradeClasses = classes.filter(matchGrade);
    const pairedIds = new Set(peaksPairs.flatMap(p => [p.classAId, p.classBId]));

    // Step 1: PEAKS pair
    const gradePair = peaksPairs.find(p => p.gradeLevel === String(grade));
    if (gradePair) {
      const cA = classes.find(c => c.id === gradePair.classAId);
      const cB = classes.find(c => c.id === gradePair.classBId);
      if (cA && cB) {
        let placed = false;
        for (let i = 0; i < pids.length - 1 && !placed; i++) {
          const p1 = pids[i], p2 = pids[i + 1];
          if (used.has(p1) || used.has(p2)) continue;
          const fwd = canAssign(cA, p1) && canAssign(cB, p2);
          const rev = canAssign(cB, p1) && canAssign(cA, p2);
          if (fwd || rev) {
            const [c1, c2] = fwd ? [cA, cB] : [cB, cA];
            // Double-check caps are not exceeded before assigning
            const ms1 = maxSize(c1), ms2 = maxSize(c2);
            if (getE(c1.id, p1) >= ms1 || getE(c2.id, p2) >= ms2) {
              // Cap would be exceeded — try the other direction
              const [d1, d2] = fwd ? [cB, cA] : [cA, cB];
              const ms3 = maxSize(d1), ms4 = maxSize(d2);
              if (getE(d1.id, p1) < ms3 && getE(d2.id, p2) < ms4) {
                schedule[p1] = d1.name; schedule[p2] = d2.name;
                used.add(p1); used.add(p2);
                addE(d1.id, p1); addE(d2.id, p2);
                markSlot(d1.id, p1); markSlot(d2.id, p2);
                stdCount += 2; placed = true;
              }
              // else: neither direction works for this pair, continue to next pair
            } else {
              schedule[p1] = c1.name; schedule[p2] = c2.name;
              used.add(p1); used.add(p2);
              addE(c1.id, p1); addE(c2.id, p2);
              markSlot(c1.id, p1); markSlot(c2.id, p2);
              stdCount += 2; placed = true;
            }
          }
        }
        if (!placed) {
          // Fallback: relax the fwd/rev preference but still respect caps
          for (let i = 0; i < pids.length - 1; i++) {
            const pa = pids[i], pb = pids[i+1];
            if (used.has(pa) || used.has(pb)) continue;
            const fwdOk = canAssign(cA, pa) && canAssign(cB, pb);
            const revOk = canAssign(cB, pa) && canAssign(cA, pb);
            if (fwdOk || revOk) {
              const [c1, c2] = fwdOk ? [cA, cB] : [cB, cA];
              schedule[pa] = c1.name; schedule[pb] = c2.name;
              used.add(pa); used.add(pb);
              addE(c1.id, pa); addE(c2.id, pb);
              markSlot(c1.id, pa); markSlot(c2.id, pb);
              stdCount += 2; placed = true; break;
            }
          }
          // Last resort: ignore caps to avoid unscheduled student (will show in conflicts)
          if (!placed) {
            for (let i = 0; i < pids.length - 1; i++) {
              if (!used.has(pids[i]) && !used.has(pids[i+1])) {
                schedule[pids[i]] = cA.name; schedule[pids[i+1]] = cB.name;
                used.add(pids[i]); used.add(pids[i+1]);
                addE(cA.id, pids[i]); addE(cB.id, pids[i+1]);
                markSlot(cA.id, pids[i]); markSlot(cB.id, pids[i+1]);
                stdCount += 2; break;
              }
            }
          }
        }
      }
    }

    // Step 2: Intervention
    const assignIntervention = isEla => {
      if (stdCount >= MAX_STANDARD) return;
      const intC = electives.find(e => isEla ? e.isElaIntervention : e.isMathIntervention);
      if (!intC) return;
      // Prefer 1st period per school rule
      const candidates = [pids[0], ...pids.slice(1)];
      const open = candidates.find(p => !used.has(p) && canAssignFor(intC, p, used));
      if (open) { schedule[open] = intC.name; used.add(open); addE(intC.id, open); markSlot(intC.id, open); stdCount++; }
    };
    if (desigs.includes("ELA Intervention")) assignIntervention(true);
    if (desigs.includes("Math Intervention")) assignIntervention(false);

    // Step 3: Single-period-locked standard classes
    const usedCats = new Set();
    gradeClasses.filter(c => !pairedIds.has(c.id) && singlePeriod.has(c.id))
      .sort((a, b) => (classPMap[a.id]||[]).length - (classPMap[b.id]||[]).length)
      .forEach(cls => {
        if (stdCount >= MAX_STANDARD) return;
        if (cls.category && usedCats.has(cls.category.toLowerCase())) return;
        const open = (classPMap[cls.id]||pids).find(p => !used.has(p) && canAssign(cls, p));
        if (open) { schedule[open] = cls.name; used.add(open); addE(cls.id, open); markSlot(cls.id, open); stdCount++; if (cls.category) usedCats.add(cls.category.toLowerCase()); }
      });

    // Step 4: Remaining standard classes
    gradeClasses.filter(c => !pairedIds.has(c.id) && !singlePeriod.has(c.id))
      .sort((a, b) => (classPMap[a.id]||pids).length - (classPMap[b.id]||pids).length)
      .forEach(cls => {
        if (stdCount >= MAX_STANDARD) return;
        if (cls.category && usedCats.has(cls.category.toLowerCase())) return;
        const open = (classPMap[cls.id]||pids).find(p => !used.has(p) && canAssign(cls, p));
        if (open) { schedule[open] = cls.name; used.add(open); addE(cls.id, open); markSlot(cls.id, open); stdCount++; if (cls.category) usedCats.add(cls.category.toLowerCase()); }
      });

    // Step 5: Assign 2 electives - minimum-aware two-pass
    const choices = getChoices(student);
    const assigned = [];

    const tryElective = (el, preferBusy) => {
      if (assigned.length >= NUM_ELECTIVES) return false;
      if (!el || el.isElaIntervention || el.isMathIntervention) return false;
      if (el.gradeRestriction && parseInt(el.gradeRestriction) !== grade) return false;
      if (assigned.includes(el.name)) return false;
      const avail = electivePMap[el.id] || pids;
      const openSlots = avail.filter(p => !used.has(p) && canAssignFor(el, p, used));
      if (!openSlots.length) return false;
      // preferBusy: use getBestSlot to concentrate into existing sections
      const open = preferBusy
        ? getBestSlot(el, openSlots)
        : openSlots[0];
      schedule[open] = "[E] " + el.name;
      assigned.push(el.name);
      used.add(open);
      addE(el.id, open);
      markSlot(el.id, open);
      return true;
    };

    const getTotalEnroll = el => pids.reduce((s, p) => s + getE(el.id, p), 0);
    
    // An elective needs minimum help if ANY active slot is below min
    // OR if it has fewer total students than its minimum
    const isUnderMin = el => {
      const mn = minSize(el);
      if (mn <= 0) return false;
      const total = getTotalEnroll(el);
      if (total >= mn) return false; // already met total minimum
      return true;
    };
    
    // Get the best period slot to assign for an under-minimum elective
    // Prefer the slot with most enrollment (concentrate into best section first)
    const getBestSlot = (el, openSlots) => {
      const mn = minSize(el);
      if (mn <= 0 || openSlots.length <= 1) return openSlots[0];
      // Find slots that already have students (prefer building up existing sections)
      const activeOpenSlots = openSlots.filter(p => getE(el.id, p) > 0);
      if (activeOpenSlots.length > 0) {
        return activeOpenSlots.sort((a, b) => getE(el.id, b) - getE(el.id, a))[0];
      }
      return openSlots[0];
    };

    // Pass 1: prioritize choices that are below minimum (concentrate students there)
    for (const choice of choices) {
      if (assigned.length >= NUM_ELECTIVES) break;
      const el = electives.find(e => e.name.toLowerCase() === choice.toLowerCase() && !e.isElaIntervention && !e.isMathIntervention);
      if (el && isUnderMin(el)) tryElective(el, true);
    }

    // Pass 2: fill remaining slots by ranked preference
    for (const choice of choices) {
      if (assigned.length >= NUM_ELECTIVES) break;
      const el = electives.find(e => e.name.toLowerCase() === choice.toLowerCase() && !e.isElaIntervention && !e.isMathIntervention);
      if (el) tryElective(el, false);
    }

    if (assigned.length === 0 && choices.length > 0) {
      // Build a detailed reason explaining WHY each choice failed
      const reasons = choices.slice(0, 5).map(choice => {
        const el = electives.find(e => e.name.toLowerCase() === choice.toLowerCase() && !e.isElaIntervention && !e.isMathIntervention);
        if (!el) return choice + " (not found)";
        if (el.gradeRestriction && parseInt(el.gradeRestriction) !== grade) return choice + " (grade restricted)";
        const avail = electivePMap[el.id] || pids;
        const openSlots = avail.filter(p => !used.has(p));
        if (!openSlots.length) return choice + " (no open period in student schedule)";
        const capFull = openSlots.every(p => getE(el.id, p) >= maxSize(el));
        if (capFull) return choice + " (class full)";
        const slotsFull = getSlots(el.id).size >= maxPeriods(el) && !openSlots.some(p => getSlots(el.id).has(p));
        if (slotsFull) return choice + " (max periods reached)";
        return choice + " (unavailable)";
      });
      conflicts.push({ student, reason: "All choices blocked: " + reasons.join("; "), choices });
    } else if (assigned.length < NUM_ELECTIVES && choices.length > 0) {
      const remaining = choices.filter(c => !assigned.map(a => a.toLowerCase()).includes(c.toLowerCase()));
      const reasons = remaining.slice(0, 3).map(choice => {
        const el = electives.find(e => e.name.toLowerCase() === choice.toLowerCase() && !e.isElaIntervention && !e.isMathIntervention);
        if (!el) return choice + " (not found)";
        if (el.gradeRestriction && parseInt(el.gradeRestriction) !== grade) return choice + " (grade restricted)";
        const avail = electivePMap[el.id] || pids;
        const openSlots = avail.filter(p => !used.has(p));
        if (!openSlots.length) return choice + " (no open period)";
        const capFull = openSlots.every(p => getE(el.id, p) >= maxSize(el));
        if (capFull) return choice + " (class full)";
        return choice + " (unavailable)";
      });
      conflicts.push({
        student,
        reason: "Got " + assigned.join(", ") + " — 2nd elective blocked: " + reasons.join("; "),
        choices, partial: true, assigned
      });
    } else if (choices.length === 0) {
      conflicts.push({ student, reason: "No elective choices provided in CSV", choices: [] });
    }

    return { student, schedule, elective: assigned[0] || null, elective2: assigned[1] || null, electives: assigned, conflicts: assigned.length < NUM_ELECTIVES ? ["partial"] : [] };
  });

  // ── Post-run: validate caps and check minimums ──────────────────────────────
  // Flag any period slot that exceeded its configured max (sanity check)
  const overCap = [];
  [...classes, ...electives].forEach(item => {
    const ms = maxSize(item);
    pids.forEach(pid => {
      const e = getE(item.id, pid);
      if (e > ms) overCap.push({ item, pid, enrolled: e, cap: ms });
    });
  });
  if (overCap.length) console.warn("Over-cap violations:", overCap.map(o => o.item.name + " " + o.pid + "=" + o.enrolled + "/" + o.cap));

  // Check for students assigned the same class name in multiple periods
  assignments.forEach(a => {
    const classNames = Object.values(a.schedule).map(n => n.replace("[E] ",""));
    const dupes = classNames.filter((n, i) => classNames.indexOf(n) !== i);
    if (dupes.length) console.error("DUPLICATE CLASS for student", a.student.student_name, ":", dupes, a.schedule);
  });

  // Check for students with same class name appearing in export (different IDs, same name)
  const classNameToIds = {};
  [...classes, ...electives].forEach(item => {
    if (!classNameToIds[item.name]) classNameToIds[item.name] = [];
    classNameToIds[item.name].push(item.id);
  });
  Object.entries(classNameToIds).forEach(([name, ids]) => {
    if (ids.length > 1) console.warn("DUPLICATE CLASS NAME:", name, "has", ids.length, "entries with IDs:", ids);
  });

  // ── Post-run: check minimums ───────────────────────────────────────────────
  const allItems = [...classes, ...electives];
  const underMin = [];
  allItems.forEach(item => {
    const mn = minSize(item);
    if (mn <= 0) return;
    let total = 0;
    const periodEnrollments = {};
    pids.forEach(pid => { const e = getE(item.id, pid); if (e > 0) { total += e; periodEnrollments[pid] = e; } });
    if (total > 0 && total < mn) {
      underMin.push({ item, totalEnrolled: total, minSize: mn, shortage: mn - total, periodEnrollments });
      if (item.minAction === "reassign") {
        assignments.forEach(a => {
          const entry = Object.entries(a.schedule).find(([, cls]) => cls === item.name || cls === "[E] " + item.name);
          if (!entry) return;
          const [assignedPid] = entry;
          const choices = getChoices(a.student);
          const idx = choices.findIndex(c => c.toLowerCase() === item.name.toLowerCase());
          const next = idx >= 0 ? choices.slice(idx + 1) : choices;
          for (const choice of next) {
            const el = electives.find(e => e.name.toLowerCase() === choice.toLowerCase() && !e.isElaIntervention && !e.isMathIntervention);
            if (!el) continue;
            if (el.gradeRestriction && parseInt(el.gradeRestriction) !== parseInt(a.student.grade)) continue;
            const avail = electivePMap[el.id] || pids;
            const openP = avail.find(p => p !== assignedPid && !Object.keys(a.schedule).includes(p) && canAssign(el, p));
            if (openP) {
              delete a.schedule[assignedPid];
              a.schedule[openP] = "[E] " + el.name;
              a.electives = (a.electives || []).map(e => e === item.name ? el.name : e);
              if (a.elective === item.name) a.elective = el.name;
              addE(el.id, openP); markSlot(el.id, openP);
              break;
            }
          }
        });
      }
    }
  });

  return { assignments, conflicts, underMin };
}


function exportToExcel(result, state, runName) {
  const { assignments } = result;
  const { periods } = state;
  const wb = XLSX.utils.book_new();
  const allClasses = {};
  assignments.forEach(a => {
    Object.entries(a.schedule).forEach(([pid, cls]) => {
      const clean = cls.replace("[E] ", "");
      if (!allClasses[clean]) allClasses[clean] = {};
      if (!allClasses[clean][pid]) allClasses[clean][pid] = [];
      allClasses[clean][pid].push(a.student.student_name);
    });
  });
  const pCols = periods.map(p => p.label + (p.startTime ? " (" + p.startTime + (p.endTime ? "-" + p.endTime : "") + ")" : ""));
  const masterRows = [["Class", ...pCols, "Total"]];
  masterRows.push(["Scheduled Time", ...periods.map(p => p.startTime + (p.endTime ? " - " + p.endTime : "")), ""]);
  Object.entries(allClasses).forEach(([cls, pd]) => {
    const row = [cls];
    periods.forEach(p => { const s = pd[p.id] || []; row.push(s.length ? s.length + " students" : ""); });
    row.push(periods.reduce((sum, p) => sum + (pd[p.id] ? pd[p.id].length : 0), 0));
    masterRows.push(row);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(masterRows);
  ws1["!cols"] = [{ wch: 28 }, ...periods.map(() => ({ wch: 16 })), { wch: 8 }];
  XLSX.utils.book_append_sheet(wb, ws1, "Master Schedule");
  const rosterRows = [["Class", ...pCols]];
  Object.entries(allClasses).forEach(([cls, pd]) => {
    const max = Math.max(...periods.map(p => (pd[p.id] || []).length), 0);
    if (!max) return;
    rosterRows.push([cls, ...periods.map(p => (pd[p.id] || []).length ? (pd[p.id].length + " enrolled") : "")]);
    for (let i = 0; i < max; i++) { const row = [""]; periods.forEach(p => { row.push((pd[p.id] || [])[i] || ""); }); rosterRows.push(row); }
    rosterRows.push(new Array(periods.length + 1).fill(""));
  });
  const ws2 = XLSX.utils.aoa_to_sheet(rosterRows);
  ws2["!cols"] = [{ wch: 28 }, ...periods.map(() => ({ wch: 22 }))];
  XLSX.utils.book_append_sheet(wb, ws2, "Class Rosters");
  const headers = ["Student Name", "Student ID", "Grade", "Designation", ...periods.map(p => p.label), "Elective 1", "Elective 2"];
  const rows = assignments.map(a => {
    const row = { "Student Name": a.student.student_name, "Student ID": a.student.student_id, "Grade": a.student.grade, "Designation": a.student.designation || "" };
    periods.forEach(p => { row[p.label] = (a.schedule[p.id] || "-").replace("[E] ", ""); });
    row["Elective 1"] = (a.electives && a.electives[0]) || a.elective || "UNASSIGNED"; row["Elective 2"] = (a.electives && a.electives[1]) || a.elective2 || "UNASSIGNED";
    return row;
  });
  const ws3 = XLSX.utils.json_to_sheet(rows, { header: headers });
  ws3["!cols"] = [{ wch: 24 }, { wch: 12 }, { wch: 8 }, { wch: 20 }, ...periods.map(() => ({ wch: 20 })), { wch: 20 }];
  XLSX.utils.book_append_sheet(wb, ws3, "Per-Student Schedule");
  if (result.conflicts && result.conflicts.length > 0) {
    const cd = result.conflicts.map(c => ({ "Student Name": c.student.student_name, "Student ID": c.student.student_id, "Grade": c.student.grade, "Designation": c.student.designation || "", "Issue": c.reason, "Choices": c.choices ? c.choices.join(", ") : "" }));
    const ws4 = XLSX.utils.json_to_sheet(cd);
    ws4["!cols"] = [{ wch: 24 }, { wch: 12 }, { wch: 8 }, { wch: 20 }, { wch: 36 }, { wch: 60 }];
    XLSX.utils.book_append_sheet(wb, ws4, "Conflicts");
  }
  XLSX.writeFile(wb, runName + ".xlsx");
}
